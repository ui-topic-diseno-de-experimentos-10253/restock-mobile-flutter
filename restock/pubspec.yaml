name: restock
description: "Flutter Restock app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  flutter_bloc: ^9.1.1
  intl: ^0.20.2
  path: ^1.9.1
  flutter_launcher_icons: ^0.14.4
  expandable_text: ^2.3.0
  image_picker: ^1.0.7 
  cloudinary_flutter: ^1.0.0
  cloudinary_url_gen: ^1.0.0
  excel: ^4.0.3
  path_provider: ^2.1.1
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png 